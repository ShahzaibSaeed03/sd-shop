<div class="p-4 md:p-8 bg-white min-h-screen max-w-7xl mx-auto">

  <!-- Title -->
  <h2 class="font-medium text-[32px] leading-tight mb-6 md:mb-8 text-gray-900">
    Customer Reviews
  </h2>

  <!-- Top Section -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-10">

    <!-- LEFT SIDE -->
    <div>

      <!-- Rating Summary -->
      <div class="text-center mb-6 md:mb-8">
        <div class="text-4xl md:text-5xl font-semibold">
          {{ rating }}
        </div>

        <div class="text-yellow-500 text-xl md:text-2xl mt-2">
          <i class="fas fa-star" *ngFor="let s of [1,2,3,4,5]"></i>
        </div>

        <div class="text-gray-500 mt-2 text-sm md:text-base">
          {{ totalReviews }} Reviews
        </div>
      </div>

      <!-- Breakdown -->
      <div class="space-y-3 md:space-y-4">

        <div
          *ngFor="let item of breakdown"
          class="flex items-center gap-2 md:gap-4"
        >

          <!-- Stars -->
          <div class="text-yellow-500 w-20 md:w-32 text-xs md:text-base">
            <i class="fas fa-star" *ngFor="let s of [].constructor(item.stars)"></i>
          </div>

          <!-- Bar -->
          <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
            <div
              class="h-full bg-purple-600 rounded-full"
              [style.width.%]="getPercentage(item.count)">
            </div>
          </div>

          <!-- Count -->
          <div class="w-6 text-gray-600 text-xs md:text-sm">
            {{ item.count }}
          </div>

        </div>

      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div>

      <h3 class="font-medium mb-2 text-sm md:text-base">
        Add a review
      </h3>

      <p class="text-xs md:text-sm text-gray-500 mb-4">
        Your email address will not be published. Required fields are marked *
      </p>

      <!-- Rating -->
      <div class="mb-4">
        <span class="text-sm">Your rating *</span>

        <div class="text-gray-400 text-lg md:text-xl mt-1">
          <i
            class="fas fa-star cursor-pointer"
            *ngFor="let s of [1,2,3,4,5]"
            (click)="setRating(s)"
            [ngClass]="{
              'text-yellow-500': s <= selectedRating
            }"
          ></i>
        </div>
      </div>

      <!-- Review -->
      <textarea
        class="w-full h-32 md:h-40 bg-gray-100 rounded-lg p-3 mb-4 outline-none text-sm"
        placeholder="Your review *"
      ></textarea>

      <!-- Name -->
      <input
        class="w-full bg-gray-100 rounded-lg p-3 mb-3 outline-none text-sm"
        placeholder="Enter Your Name"
      />

      <!-- Email -->
      <input
        class="w-full bg-gray-100 rounded-lg p-3 mb-3 outline-none text-sm"
        placeholder="Enter Your Email"
      />

      <!-- Checkbox -->
      <label class="flex items-start gap-2 text-xs md:text-sm text-gray-600 mb-6">
        <input type="checkbox" class="mt-1" />
        Save my name, email, and website in this browser for the next time I comment.
      </label>

      <!-- Submit -->
      <button class="mx-auto block bg-gradient-to-r from-purple-500 to-purple-700 text-white rounded-[5px] px-[20px] py-[10px] h-[51px] min-w-[223px] flex items-center justify-center gap-[10px] text-sm">
        Submit
      </button>

    </div>

  </div>

  <!-- Reviews List -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mt-8 md:mt-10">

    <div
      *ngFor="let review of reviews"
      class="bg-gray-100 p-4 md:p-5 rounded-xl"
    >

      <div class="flex justify-between items-start mb-2">
        <h4 class="font-medium text-sm md:text-base">
          {{ review.name }}
        </h4>
        <span class="text-xs md:text-sm text-gray-500">
          {{ review.date }}
        </span>
      </div>

      <div class="text-yellow-500 mb-2 text-sm">
        <i class="fas fa-star" *ngFor="let s of [].constructor(review.rating)"></i>
      </div>

      <p class="text-xs md:text-sm text-gray-600 mb-4">
        {{ review.text }}
      </p>

      <div class="flex items-center gap-4 text-gray-500 text-xs md:text-sm">
        <div class="flex items-center gap-1">
          <i class="far fa-thumbs-up"></i> {{ review.likes }}
        </div>
        <div class="flex items-center gap-1">
          <i class="far fa-thumbs-down"></i> {{ review.dislikes }}
        </div>
      </div>

    </div>

  </div>

</div>
