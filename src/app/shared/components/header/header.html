<header class=" px-4 mx-auto py-3 flex items-center justify-between rounded-xl relative z-50 max-w-7xl">

  <div class="flex items-center w-[512px] h-[45px] gap-[30px]">

    <!-- Logo -->
    <div>
      <img src="icons/Logo.png" alt="logo" class="w-[180px] h-[45px] object-contain" />
    </div>

    <!-- Desktop Menu -->
    <nav class="hidden md:flex items-center w-[281px] h-[20px] gap-[20px] text-gray-800 font-medium">
      <a class="hover:text-black cursor-pointer" href="">Home</a>

      <a class="hover:text-black cursor-pointer flex items-center gap-1" routerLink="/product-all">
        Jogos
        <i class="fa-solid fa-chevron-down text-xs"></i>
      </a>

      <a class="hover:text-black cursor-pointer" routerLink="/help">
        Central de Ajuda
      </a>
    </nav>
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-2 sm:gap-3">

    <!-- Search (desktop only) -->
    <div
      class="hidden md:flex items-center w-[251px] h-[50px] gap-[10px] px-[20px] py-[10px] rounded-[5px] border border-[#D4D4D4] bg-[#F5F5F5]">

      <img src="/icons/search.png" class="w-[25px] h-[25px]" />

      <input type="text" placeholder="Pesquisar jogos"
        class="bg-transparent outline-none w-full text-[14px] leading-[150%] placeholder:text-gray-400 flex items-center" />

    </div>

    <!-- Language (desktop only) -->
    <div class="relative hidden md:flex items-center gap-2">

      <!-- Button -->
      <div (click)="openLanguageModal()"
        class="flex items-center w-[144px] h-[50px] gap-[10px] px-[12px] py-[10px] rounded-[5px] border border-[#6E11B0] bg-white shadow-sm cursor-pointer">
        <img src="https://flagcdn.com/w20/br.png"
          class="w-[24.725px] h-[24.725px] relative top-[0.14px] left-[0.14px] rounded-sm object-cover" />
        <span
          class="w-[55px] h-[24px] font-normal text-[14px] md:text-[16px] leading-[150%] tracking-normal text-gray-800">PT/BR</span>
        <i class="fa-solid fa-chevron-down text-xs"></i>
      </div>

      <!-- ✅ DROPDOWN -->
      <div *ngIf="isLanguageModalOpen"
        class="absolute top-[110%] right-0 w-[469px] bg-white rounded-[12px] p-[30px] shadow-xl z-50 flex flex-col gap-[22px]">

        <!-- Heading -->
        <div>
          <h2 class="font-medium text-[24px] leading-none tracking-[-0.02em] mb-2">
            Choose region and language
          </h2>

          <p class="font-normal text-[16px] leading-none tracking-[-0.02em] text-gray-500">
            To create an account, please tell us where you live.
          </p>
        </div>

        <!-- Sections -->
        <div class="flex flex-col gap-[30px]">

          <!-- Currency -->
          <div class="flex flex-col gap-[12px]">
            <label class="font-medium text-[16px] leading-none tracking-[-0.02em]">
              Currency
            </label>

            <div class="flex items-center justify-between bg-gray-100 px-4 py-3 rounded-lg">
              <div class="flex items-center gap-2">
                <img src="https://flagcdn.com/w20/gb.png" class="w-5 h-4 rounded-sm" />
                <span class="font-normal text-[16px] leading-none tracking-[-0.02em] text-[#A1A1A1]">
                  United Kingdom
                </span>
              </div>
              <i class="fa-solid fa-chevron-down text-sm"></i>
            </div>
          </div>

          <!-- Language -->
          <div class="flex flex-col gap-[12px]">
            <label class="font-medium text-[16px] leading-none tracking-[-0.02em]">
              Language
            </label>

            <div class="flex items-center justify-between bg-gray-100 px-4 py-3 rounded-lg">
              <span class="font-normal text-[16px] leading-none tracking-[-0.02em] text-[#A1A1A1]">
                English
              </span>
              <i class="fa-solid fa-chevron-down text-sm"></i>
            </div>
          </div>

        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3">
          <button (click)="closeLanguageModal()" class="px-4 py-2 rounded-lg bg-gray-100">
            Cancel
          </button>

          <button class="px-5 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-indigo-500 text-white">
            Apply
          </button>
        </div>

      </div>

    </div>

    <!-- Coins -->
    <div *ngIf="isLoggedIn" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-[#C200FF] text-white w-[69px] h-[50px]">
      <img src="icons/coin.png" alt="coin" class="w-[19px] h-[19px] object-contain" />
      <span class="font-normal text-[16px] leading-[150%] tracking-normal">
        
      </span>
    </div>

    <!-- Login (desktop only) -->
<!-- ✅ LOGIN BUTTON (only if NOT logged in) -->
<button *ngIf="!isLoggedIn"
  (click)="openLoginModal()"
  class="hidden md:block px-5 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-indigo-500 text-white w-[104px] h-[50px]">
  Entrar
</button>

<!-- ✅ PROFILE BUTTON (only if logged in) -->
<button *ngIf="isLoggedIn"
  (click)="openPointsModal()"
  class="hidden md:flex items-center gap-2 px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 h-[50px]">

  <img src="login/user.png" class="w-6 h-6 rounded-full object-cover" />

  <span class="text-sm font-medium">
    Profile
  </span>

</button>

    <!-- Mobile Menu Button -->
    <button class="md:hidden text-2xl text-black" (click)="toggleMenu()">
      <i class="fa-solid fa-bars"></i>
    </button>

  </div>
</header>

<!-- ✅ OVERLAY -->
<div *ngIf="isMenuOpen" class="fixed inset-0 bg-black/40 z-40" (click)="closeMenu()"></div>

<!-- ✅ MOBILE SLIDE MENU -->
<div class="fixed top-0 left-0 h-full w-[260px] bg-white z-50 shadow-lg transform transition-transform duration-300"
  [ngClass]="{
    '-translate-x-full': !isMenuOpen,
    'translate-x-0': isMenuOpen
  }">
  <!-- Header -->
  <div class="p-4 border-b flex justify-between items-center">
    <h2 class="font-bold text-lg">Menu</h2>
    <button (click)="closeMenu()">
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>
  </div>

  <!-- Menu Items -->
  <nav class="p-4 space-y-4 text-gray-800 font-medium">
    <a class="block cursor-pointer" (click)="closeMenu()">Home</a>
    <a class="block cursor-pointer" (click)="closeMenu()">Jogos</a>
    <a class="block cursor-pointer" (click)="closeMenu()">Central de Ajuda</a>

    <!-- Mobile Login -->
    <button (click)="openLoginModal(); closeMenu()"
      class="w-full mt-4 px-4 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-indigo-500 text-white">
      Entrar
    </button>
  </nav>
</div>
