<header class="px-4 mx-auto py-3 flex items-center justify-between rounded-xl relative z-50 max-w-7xl">

  <!-- LEFT -->
  <div class="flex items-center gap-4 md:gap-[30px]">

    <!-- Logo -->
    <img src="icons/Logo.png" class="w-[140px] md:w-[180px] h-[40px] object-contain" />

    <!-- Desktop Menu -->
    <nav class="hidden md:flex items-center gap-[20px] text-gray-800 font-medium">
      <a class="hover:text-black cursor-pointer">Home</a>

      <a class="hover:text-black cursor-pointer flex items-center gap-1" routerLink="/product-all">
        Jogos
        <i class="fa-solid fa-chevron-down text-xs"></i>
      </a>

      <a class="hover:text-black cursor-pointer" routerLink="/help">
        Central de Ajuda
      </a>
    </nav>

  </div>

  <!-- RIGHT -->
  <div class="flex items-center gap-2 sm:gap-3">

    <!-- 🔍 Search (desktop only) -->
    <div class="hidden md:flex items-center w-[251px] h-[50px] gap-[10px] px-[20px] py-[10px] rounded-[5px] border border-[#D4D4D4] bg-[#F5F5F5]">
      <img src="/icons/search.png" class="w-[25px] h-[25px]" />
      <input type="text" placeholder="Pesquisar jogos"
        class="bg-transparent outline-none w-full text-[14px] placeholder:text-gray-400" />
    </div>

    <!-- 🌐 Language (desktop only) -->
    <div class="relative hidden md:flex items-center gap-2">

      <div (click)="openLanguageModal()"
        class="flex items-center gap-2 px-3 py-2 h-[50px] rounded border border-[#6E11B0] bg-white cursor-pointer">

        <img src="https://flagcdn.com/w20/br.png" class="w-5 h-5 rounded-sm" />
        <span class="text-sm">PT/BR</span>
        <i class="fa-solid fa-chevron-down text-xs"></i>
      </div>

      <!-- Dropdown -->
      <div *ngIf="isLanguageModalOpen"
        class="absolute top-[110%] right-0 w-[469px] bg-white rounded-xl p-6 shadow-xl z-50">

        <h2 class="text-lg font-medium mb-2">Choose region and language</h2>
        <p class="text-sm text-gray-500 mb-4">Select your preferences</p>

        <div class="space-y-4">
          <div class="bg-gray-100 p-3 rounded flex justify-between">
            <span>Currency</span>
            <i class="fa-solid fa-chevron-down"></i>
          </div>

          <div class="bg-gray-100 p-3 rounded flex justify-between">
            <span>Language</span>
            <i class="fa-solid fa-chevron-down"></i>
          </div>
        </div>

        <div class="flex justify-end gap-2 mt-4">
          <button (click)="closeLanguageModal()" class="px-4 py-2 bg-gray-100 rounded">
            Cancel
          </button>

          <button class="px-4 py-2 bg-purple-600 text-white rounded">
            Apply
          </button>
        </div>

      </div>

    </div>

    <!-- 🪙 Coins -->
    <div *ngIf="isLoggedIn"
      class="flex items-center gap-2 px-2 md:px-3 py-2 rounded-lg bg-[#C200FF] text-white h-[40px] md:h-[50px]">

      <img src="icons/coin.png" class="w-4 h-4 md:w-5 md:h-5" />
      <span class="text-sm hidden sm:block">0</span>

    </div>

    <!-- 🔐 LOGIN (VISIBLE ON MOBILE + DESKTOP) -->
    <button *ngIf="!isLoggedIn"
      (click)="openLoginModal()"
      class="flex items-center justify-center px-3 md:px-5 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-indigo-500 text-white h-[40px] md:h-[50px]">

      <span class="hidden sm:block">Entrar</span>
      <i class="fa-solid fa-user sm:hidden"></i>

    </button>

    <!-- 👤 PROFILE (VISIBLE ON MOBILE + DESKTOP) -->
    <button *ngIf="isLoggedIn"
      (click)="openPointsModal()"
      class="flex items-center gap-2 px-2 md:px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 h-[40px] md:h-[50px]">

      <img src="login/user.png" class="w-5 h-5 md:w-6 md:h-6 rounded-full" />

      <span class="hidden sm:block text-sm font-medium">
        Profile
      </span>

    </button>

    <!-- 📱 Mobile Menu Button -->
    <button class="md:hidden text-2xl" (click)="toggleMenu()">
      <i class="fa-solid fa-bars"></i>
    </button>

  </div>

</header>

<!-- OVERLAY -->
<div *ngIf="isMenuOpen" class="fixed inset-0 bg-black/40 z-40" (click)="closeMenu()"></div>

<!-- MOBILE MENU -->
<div class="fixed top-0 left-0 h-full w-[260px] bg-white z-50 shadow-lg transform transition-transform duration-300"
  [ngClass]="{
    '-translate-x-full': !isMenuOpen,
    'translate-x-0': isMenuOpen
  }">

  <!-- Header -->
  <div class="p-4 border-b flex justify-between items-center">
    <h2 class="font-bold text-lg">Menu</h2>
    <button (click)="closeMenu()">
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>
  </div>

  <!-- Links -->
  <nav class="p-4 space-y-4 font-medium">

    <a (click)="closeMenu()">Home</a>
    <a (click)="closeMenu()">Jogos</a>
    <a (click)="closeMenu()">Central de Ajuda</a>

    <!-- LOGIN -->
    <button *ngIf="!isLoggedIn"
      (click)="openLoginModal(); closeMenu()"
      class="w-full mt-4 px-4 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-indigo-500 text-white">
      Entrar
    </button>

    <!-- PROFILE -->
    <button *ngIf="isLoggedIn"
      (click)="openPointsModal(); closeMenu()"
      class="w-full mt-4 px-4 py-2 rounded-lg bg-gray-100">
      Profile
    </button>

  </nav>

</div>
