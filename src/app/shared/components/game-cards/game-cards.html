<div
  class="bg-white rounded-2xl shadow-md w-full h-full flex flex-col cursor-pointer"
  (click)="onClick()"
>

  <!-- Image -->
  <div class="w-full h-[180px] sm:h-[180px] lg:h-[220px] rounded-xl overflow-hidden">
    <img
      [src]="data.image"
      class="w-full h-full object-cover"
    />
  </div>

  <!-- Content -->
  <div class="sm:mt-0 sm:p-1 mt-3 p-3 flex flex-col flex-1">

  <!-- Title -->
  <h3 class="text-[18px] font-semibold text-gray-900 leading-tight line-clamp-2 min-h-[44px]">
    {{ data.title }}
  </h3>

  <!-- SOLD + RATING (SAME LINE) -->
  <div class="flex justify-between items-center mt-0">

    <!-- Sold (LEFT) -->
    <p class="text-[14px] text-gray-500">
      {{ data.sold || '0 Sold' }}
    </p>

    <!-- Rating (RIGHT) -->
    <div class="bg-[#F5EAD7] px-3 py-1 rounded-full flex items-center gap-1">
      <span class="text-[14px] font-medium text-gray-900">
        {{ data.rating || 0 }}
      </span>
      <span class="text-yellow-500 text-[16px]">★</span>
    </div>

  </div>

</div>

  <!-- BUTTON -->
  <button
    class=" m-3 border-2 border-[#7B2CBF] text-gray-900 py-2 rounded-xl text-[16px] font-medium hover:bg-[#7B2CBF] hover:text-white transition"
  >
    Top Up
  </button>

</div>
