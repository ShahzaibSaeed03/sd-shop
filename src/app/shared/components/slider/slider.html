<div class="w-full flex flex-col items-center">

  <!-- Slider -->
  <div class="relative w-full max-w-[1280px] 
              h-[180px] sm:h-[250px] md:h-[380px] lg:h-[466px] 
              overflow-hidden rounded-xl md:rounded-2xl">

    <!-- Images -->
    <img
      *ngFor="let slide of slides; let i = index"
      [src]="slide"
      class="absolute w-full h-full object-cover transition-opacity duration-700"
      [class.opacity-100]="i === currentIndex"
      [class.opacity-0]="i !== currentIndex"
    />

    <!-- Left Arrow -->
    <button
      (click)="prev()"
      class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 
             bg-black/20 md:bg-black/30 hover:bg-black/50 text-white 
             w-8 h-8 md:w-12 md:h-12 
             flex items-center justify-center 
             rounded-full text-sm md:text-xl transition">

      <i class="fa-solid fa-chevron-left"></i>

    </button>

    <!-- Right Arrow -->
    <button
      (click)="next()"
      class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 
             bg-black/20 md:bg-black/30 hover:bg-black/50 text-white 
             w-8 h-8 md:w-12 md:h-12 
             flex items-center justify-center 
             rounded-full text-sm md:text-xl transition">

      <i class="fa-solid fa-chevron-right"></i>

    </button>

  </div>

  <!-- Dots -->
  <div class="flex gap-2 mt-2 md:mt-4 justify-center">

    <span
      *ngFor="let s of slides; let i = index"
      class="h-2 rounded-full cursor-pointer transition-all duration-300"
      [ngClass]="{
        'w-2 bg-gray-400': i !== currentIndex,
        'w-4 md:w-6 bg-gray-700': i === currentIndex
      }"
      (click)="currentIndex = i">
    </span>

  </div>

</div>
