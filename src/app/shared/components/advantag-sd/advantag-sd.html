<div class="bg-[#ffffff] py-10 md:py-16">

  <div class="max-w-7xl mx-auto px-4 md:px-6">

    <!-- HEADER -->
    <div class="mb-8 md:mb-10 text-center md:text-left">
      <h2 class="text-[28px] md:text-[36px] font-bold text-gray-900">
        SD SHOP ADVANTAGE
      </h2>

      <p class="text-gray-500 mt-2 max-w-md text-xs md:text-sm mx-auto md:mx-0">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.
      </p>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-5">

      <div *ngFor="let item of items"
        class="card group rounded-[10px] p-[20px] transition-all duration-300 
        flex flex-col justify-between relative overflow-hidden
        min-h-[217px] gap-[10px] bg-[#f5f5f5] hover:shadow-md">

        <!-- ICON -->
        <div
          class="w-[30px] h-[30px] flex items-center justify-center rounded-lg mb-3
          bg-gray-100 group-hover:bg-white/20 transition">
          <img [src]="item.icon"
            class="w-5 h-5 md:w-6 md:h-6 object-contain transition"
            alt="icon" />
        </div>

        <div class="flex flex-col gap-[14px]">

          <!-- TITLE -->
          <h3
            class="font-medium text-[14px] md:text-[20px] leading-[150%] 
            text-gray-800 group-hover:text-white transition">
            {{ item.title }}
          </h3>

          <!-- DESC -->
          <p
            class="font-normal text-[12px] md:text-[16px] 
            text-gray-500 group-hover:text-white/80 transition">
            {{ item.desc }}
          </p>

        </div>

      </div>

    </div>

  </div>

</div>
